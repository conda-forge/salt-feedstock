{% set version = "3007.2" %}

package:
  name: salt
  version: {{ version }}

source:
  fn: salt-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/s/salt/salt-{{ version }}.tar.gz
  sha256: 76dfd8e43db646fb357ba52b45394008182549b6a5584688ed452c48c9d112ec

  patches:
    - setup.py.patch  # [win]

build:
  number: 0
  skip: true  # [win32 or py3k]

requirements:
  build:
    - python
    - setuptools
  run:
    - python
    - jinja2
    - msgpack-python
    - openssl 1.0.*
    - pycrypto
    - pyyaml
    - pyzmq >=2.2.0
    - markupsafe
    - apache-libcloud 0.18*
    - requests
    - tornado
    - pywin32  # [win]

test:
  commands:
    - salt --version  # [not win]
    - salt-minion --version

about:
  home: http://saltstack.com
  license: Apache-2.0
  license_file: LICENSE
  summary: Software to automate the management and configuration of any infrastructure or application at scale

extra:
  recipe-maintainers:
    - basepi
    - nmadhok
